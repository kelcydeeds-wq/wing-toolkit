<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>System Tune</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0e10">
<style>
  /* FOH-dark: console-black surfaces, VU-amber accent, in-spec green.
     Utility mono for data — this is a meter bridge, not a brochure. */
  :root{
    --bg:#0c0e10; --panel:#15181c; --panel2:#1c2026; --line:#2a2f36;
    --ink:#e8e6e1; --dim:#8b919a;
    --amber:#ffb454; --green:#5dd39e; --red:#ff6b5e; --blue:#6ab7ff;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; background:var(--bg); color:var(--ink);
    font:16px/1.45 ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;}
  #app{max-width:560px; margin:0 auto; padding:16px 16px 120px}

  header{display:flex; align-items:baseline; justify-content:space-between; margin:4px 0 18px}
  header h1{font-size:17px; letter-spacing:.14em; text-transform:uppercase; margin:0; font-weight:600}
  #modeBadge{font-size:11px; color:var(--amber); border:1px solid var(--amber);
    border-radius:999px; padding:2px 10px; letter-spacing:.1em}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px}
  .card h2{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim);
    margin:0 0 10px; font-weight:600}

  button{font:inherit; border:0; border-radius:var(--radius); cursor:pointer;
    color:var(--bg); background:var(--ink); padding:14px 18px; width:100%;
    font-weight:700; letter-spacing:.06em}
  button.secondary{background:var(--panel2); color:var(--ink); border:1px solid var(--line)}
  button.big{font-size:22px; padding:22px; border-radius:18px}
  button.amber{background:var(--amber)}
  button.green{background:var(--green)}
  button:disabled{opacity:.35; cursor:default}
  .row{display:flex; gap:10px}
  .row>button{flex:1}

  #roomMap,#roomMap2{width:100%; border-radius:10px; background:var(--panel2); display:block}
  .poslist{margin:10px 0 0; padding:0; list-style:none}
  .poslist li{display:flex; justify-content:space-between; padding:7px 2px;
    border-bottom:1px dashed var(--line); color:var(--dim); font-size:14px}
  .poslist li.current{color:var(--amber)}
  .poslist li.done{color:var(--green)}

  #status{min-height:22px; color:var(--amber); font-size:14px; margin:8px 0}
  .warn{color:var(--red)}
  .ok{color:var(--green)}

  canvas.trace{width:100%; height:180px; background:var(--panel2); border-radius:10px; display:block}
  .legend{display:flex; gap:14px; font-size:12px; color:var(--dim); margin-top:6px; flex-wrap:wrap}
  .legend b{font-weight:600}
  .lg-avg{color:var(--blue)} .lg-target{color:var(--dim)} .lg-corr{color:var(--green)}

  table{width:100%; border-collapse:collapse; font-size:13px}
  td,th{text-align:left; padding:6px 4px; border-bottom:1px solid var(--line)}
  th{color:var(--dim); font-weight:600; letter-spacing:.08em; text-transform:uppercase; font-size:11px}
  td.num{text-align:right; font-variant-numeric:tabular-nums}

  #fab{position:fixed; left:0; right:0; bottom:0; padding:14px 16px 22px;
    background:linear-gradient(transparent, var(--bg) 35%);}
  #fab .inner{max-width:560px; margin:0 auto}
  .hidden{display:none}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>System Tune</h1>
    <span id="modeBadge">—</span>
  </header>

  <!-- HOME -->
  <section id="home">
    <div class="card">
      <h2>Room</h2>
      <canvas id="roomMap" width="560" height="380"></canvas>
      <ul class="poslist" id="posList"></ul>
    </div>
    <div class="card">
      <h2>Run</h2>
      <div class="row">
        <button class="secondary" id="btnVerify">Verify System<br><small>~2 min · 1 position</small></button>
        <button class="amber" id="btnFull">Full Tune<br><small>guided · all positions</small></button>
      </div>
    </div>
  </section>

  <!-- SESSION -->
  <section id="sessionView" class="hidden">
    <div class="card">
      <h2 id="posTitle">Position</h2>
      <canvas id="roomMap2" width="560" height="380"></canvas>
      <p id="posHint" style="color:var(--dim); font-size:14px; margin:10px 0 0"></p>
      <div id="status"></div>
    </div>
    <div class="card">
      <h2>Last trace</h2>
      <canvas class="trace" id="liveTrace" width="560" height="180"></canvas>
      <div class="legend" id="liveMeta"></div>
    </div>
  </section>

  <!-- REVIEW -->
  <section id="reviewView" class="hidden"></section>

  <!-- VERIFY REPORT -->
  <section id="verifyView" class="hidden"></section>

  <div id="fab"><div class="inner" id="fabInner"></div></div>
</div>

<script>
const ws = new WebSocket(`ws://${location.host}`);
const send = (m) => ws.readyState === 1 && ws.send(JSON.stringify(m));
const $ = (id) => document.getElementById(id);

let room = null, session = null, lastTrace = null;

ws.onmessage = (e) => {
  const { event, payload } = JSON.parse(e.data);
  if (event === 'room') { room = payload; drawRoom($('roomMap')); renderPosList(); }
  if (event === 'session') { session = payload; render(); }
  if (event === 'trace') { lastTrace = payload; drawTrace($('liveTrace'), [seriesFrom(payload)]); 
    $('liveMeta').innerHTML = `<span><b>${payload.outputId}</b></span>
      <span>delay ${payload.delayMs.toFixed(1)} ms</span>
      <span>lvl ${payload.levelDbfs} dBFS</span>
      <span class="${payload.polarity>0?'ok':'warn'}">${payload.polarity>0?'polarity +':'POLARITY −'}</span>`; }
  if (event === 'measuring') setStatus(`Sweeping ${payload.output} @ ${payload.position}…`);
  if (event === 'warning') setStatus(payload.message, 'warn');
  if (event === 'error') setStatus(payload.message, 'warn');
  if (event === 'info') setStatus(payload.message, 'ok');
};

function setStatus(t, cls){ const s=$('status'); if(!s) return; s.textContent=t; s.className=cls||''; }

function show(id){
  for (const v of ['home','sessionView','reviewView','verifyView']) $(v).classList.add('hidden');
  $(id).classList.remove('hidden');
}

function render(){
  $('modeBadge').textContent = (session?.mode || 'idle').toUpperCase();
  const fab = $('fabInner'); fab.innerHTML = '';

  if (!session || session.state === 'idle') { show('home'); return; }

  if (session.state === 'waiting_position' || session.state === 'measuring') {
    show('sessionView');
    const cur = session.positions[session.posIndex];
    $('posTitle').textContent = `Position ${session.posIndex+1} of ${session.positions.length} — ${cur?.label ?? ''}`;
    $('posHint').textContent = 'Move the mic to the highlighted spot, mic at ear height, pointed up. Keep clear of the mic during the sweep.';
    drawRoom($('roomMap2'), cur?.id);

    if (session.state === 'waiting_position') {
      const b = mkBtn('READY — RUN SWEEP', 'big green', () => send({action:'ready'}));
      fab.appendChild(b);
      if (session.posIndex > 0) fab.appendChild(mkBtn('Retake previous position','secondary',()=>send({action:'retake'})));
    } else {
      const b = mkBtn('MEASURING…', 'big'); b.disabled = true; fab.appendChild(b);
    }
  }

  if (session.state === 'review') { renderReview(); show('reviewView');
    fab.appendChild(mkBtn('APPLY TO CONSOLE','big amber',()=>confirm('Write recommended EQ + delays to the Wing?')&&send({action:'apply'})));
    fab.appendChild(mkBtn('Discard','secondary',()=>send({action:'reset'})));
  }

  if (session.state === 'done') {
    if (session.mode === 'verify') { renderVerify(); show('verifyView');
      fab.appendChild(mkBtn('Save as new baseline','secondary',()=>send({action:'baseline'})));
    } else { setStatusDone(); }
    fab.appendChild(mkBtn('Home','secondary',()=>send({action:'reset'})));
  }
}

function setStatusDone(){
  show('reviewView');
  const el = $('reviewView');
  if (session.recommendations?.applied) {
    el.insertAdjacentHTML('afterbegin',
      `<div class="card"><h2>Applied</h2><p class="ok">Tuning written to console. A/B against the saved baseline scene and trust your ears for the final call.</p></div>`);
  }
}

function renderReview(){
  const el = $('reviewView'); el.innerHTML = '';
  const rec = session.recommendations; if (!rec) return;

  // Delays
  let rows = '';
  for (const [id, d] of Object.entries(rec.delays)) {
    if (id.startsWith('_')) continue;
    rows += `<tr><td>${id}</td><td class="num">${d.measuredMs} ms</td><td class="num"><b>+${d.addDelayMs} ms</b></td></tr>`;
  }
  el.insertAdjacentHTML('beforeend', `<div class="card"><h2>Alignment</h2>
    <table><tr><th>Output</th><th style="text-align:right">Arrival</th><th style="text-align:right">Add delay</th></tr>${rows}</table></div>`);

  // Per-output EQ
  for (const [id, o] of Object.entries(rec.perOutput)) {
    const cid = `trace_${id}`;
    let frows = o.filters.map(f =>
      `<tr><td>${f.type}</td><td class="num">${f.freq} Hz</td><td class="num">${f.gainDb>0?'+':''}${f.gainDb} dB</td><td class="num">Q ${f.q}</td><td style="color:var(--dim)">${f.reason}</td></tr>`).join('');
    el.insertAdjacentHTML('beforeend', `<div class="card"><h2>${o.label}${o.polarityIssue?' — <span class="warn">check polarity</span>':''}</h2>
      <canvas class="trace" id="${cid}" width="560" height="180"></canvas>
      <div class="legend"><span class="lg-avg"><b>—</b> measured avg</span><span class="lg-target"><b>—</b> target</span><span class="lg-corr"><b>—</b> corrected (est)</span></div>
      <table><tr><th>Type</th><th style="text-align:right">Freq</th><th style="text-align:right">Gain</th><th style="text-align:right">Q</th><th>Why</th></tr>${frows||'<tr><td colspan="5" style="color:var(--dim)">No correction needed</td></tr>'}</table></div>`);
    const corrected = estimateCorrected(o);
    drawTrace($(cid), [
      { freqs:o.freqs, magDb:o.avg, color:'#6ab7ff' },
      { freqs:o.freqs, magDb:o.target, color:'#8b919a', dash:true },
      { freqs:o.freqs, magDb:corrected, color:'#5dd39e' }
    ]);
  }
}

function renderVerify(){
  const el = $('verifyView'); el.innerHTML = '';
  const r = session.recommendations; if (!r) return;
  let rows = '';
  for (const o of r.outputs) {
    const drift = o.drift
      ? `${o.drift.levelDb>0?'+':''}${o.drift.levelDb} dB / ${o.drift.delayMs>0?'+':''}${o.drift.delayMs} ms`
      : '—';
    const cls = o.drift && (Math.abs(o.drift.levelDb)>2 || Math.abs(o.drift.delayMs)>1) ? 'warn' : 'ok';
    rows += `<tr><td>${o.label}</td><td class="num">${o.delayMs} ms</td><td class="num">${o.levelDbfs} dBFS</td>
      <td class="num ${o.polarity>0?'ok':'warn'}">${o.polarity>0?'+':'−'}</td><td class="num ${cls}">${drift}</td></tr>`;
  }
  el.insertAdjacentHTML('beforeend', `<div class="card"><h2>Verify report ${r.baselineFound?'':'— no baseline yet'}</h2>
    <table><tr><th>Output</th><th style="text-align:right">Arrival</th><th style="text-align:right">Level</th><th style="text-align:right">Pol</th><th style="text-align:right">Drift vs baseline</th></tr>${rows}</table></div>`);
}

/* ---------- drawing ---------- */

function drawRoom(cv, highlightId){
  if (!room || !cv) return;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  const sx = W / room.width, sy = H / room.depth;

  // stage
  ctx.fillStyle = '#22262d';
  ctx.fillRect(0, 0, W, room.stageDepth * sy);
  ctx.fillStyle = '#8b919a'; ctx.font = '11px ui-monospace';
  ctx.fillText('STAGE', 10, 16);

  for (const p of room.positions) {
    const x = p.x * sx, y = p.y * sy;
    const isHi = p.id === highlightId;
    ctx.beginPath();
    ctx.arc(x, y, isHi ? 14 : 8, 0, Math.PI * 2);
    ctx.fillStyle = isHi ? '#ffb454' : '#3a4048';
    ctx.fill();
    if (isHi) { ctx.strokeStyle = '#ffb454'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI*2); ctx.stroke(); }
    ctx.fillStyle = isHi ? '#ffb454' : '#8b919a';
    const tw = ctx.measureText(p.label).width;
    const tx = x + 18 + tw > W - 6 ? x - 18 - tw : x + 18;
    ctx.fillText(p.label, tx, y + 4);
  }
}

function renderPosList(){
  const ul = $('posList'); if (!ul || !room) return;
  ul.innerHTML = room.positions.map(p =>
    `<li><span>${p.label}</span><span>${p.x}m, ${p.y}m · w${p.weight}</span></li>`).join('');
}

function seriesFrom(t){ return { freqs:t.freqs, magDb:t.magDb, color:'#6ab7ff' }; }

function drawTrace(cv, series){
  if (!cv || !series?.length) return;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height, pad = 26;
  ctx.clearRect(0,0,W,H);
  ctx.font = '10px ui-monospace'; ctx.fillStyle = '#5a616b'; ctx.strokeStyle = '#232830';

  const fLo = Math.log10(20), fHi = Math.log10(20000);
  const dLo = -18, dHi = 12;
  const X = f => pad + ((Math.log10(f)-fLo)/(fHi-fLo)) * (W-pad-8);
  const Y = d => H-18 - ((d-dLo)/(dHi-dLo)) * (H-30);

  for (const f of [31.5,63,125,250,500,1000,2000,4000,8000,16000]) {
    ctx.beginPath(); ctx.moveTo(X(f),8); ctx.lineTo(X(f),H-18); ctx.stroke();
    ctx.fillText(f>=1000?`${f/1000}k`:f, X(f)-8, H-6);
  }
  for (const d of [-12,-6,0,6]) {
    ctx.beginPath(); ctx.moveTo(pad,Y(d)); ctx.lineTo(W-8,Y(d)); ctx.stroke();
    ctx.fillText(`${d>0?'+':''}${d}`, 2, Y(d)+3);
  }

  for (const s of series) {
    ctx.beginPath();
    ctx.strokeStyle = s.color; ctx.lineWidth = 1.6;
    ctx.setLineDash(s.dash ? [5,4] : []);
    s.freqs.forEach((f,i)=>{ const x=X(f), y=Y(Math.max(dLo,Math.min(dHi,s.magDb[i])));
      i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
    ctx.stroke(); ctx.setLineDash([]);
  }
}

/** Rough preview of post-EQ response for the review chart. */
function estimateCorrected(o){
  const out = o.avg.slice();
  for (const f of o.filters) {
    for (let i=0;i<o.freqs.length;i++){
      const fr = o.freqs[i];
      if (f.type==='hshelf'){ if (fr>=f.freq/2) out[i]+=f.gainDb*Math.min(1,Math.log2(fr/(f.freq/2))); }
      else {
        const oct = Math.log2(fr/f.freq);
        const bw = 1.41/f.q;
        out[i] += f.gainDb * Math.exp(-(oct*oct)/(2*Math.pow(bw/2.355,2)));
      }
    }
  }
  return out;
}

$('btnVerify').onclick = () => send({action:'start', mode:'verify'});
$('btnFull').onclick   = () => send({action:'start', mode:'full'});

function mkBtn(html, cls, fn){
  const b=document.createElement('button');
  b.className=cls; b.innerHTML=html; if(fn) b.onclick=fn;
  b.style.marginTop='8px'; return b;
}
</script>
</body>
</html>
