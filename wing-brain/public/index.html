<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>System Tune</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0e10">
<style>
  /* FOH-dark: console-black surfaces, VU-amber accent, in-spec green.
     Utility mono for data — this is a meter bridge, not a brochure. */
  :root{
    --bg:#0c0e10; --panel:#15181c; --panel2:#1c2026; --line:#2a2f36;
    --ink:#e8e6e1; --dim:#8b919a;
    --amber:#ffb454; --green:#5dd39e; --red:#ff6b5e; --blue:#6ab7ff;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; background:var(--bg); color:var(--ink);
    font:16px/1.45 ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;}
  #app{max-width:560px; margin:0 auto; padding:16px 16px 120px}

  header{display:flex; align-items:center; justify-content:space-between; margin:4px 0 18px}
  header h1{font-size:17px; letter-spacing:.14em; text-transform:uppercase; margin:0; font-weight:600}
  .hleft{display:flex; align-items:center; gap:10px}
  #exitBtn{width:auto; padding:5px 13px; font-size:16px; font-weight:600;
    background:var(--panel2); color:var(--ink); border:1px solid var(--line); border-radius:10px}
  #modeBadge{font-size:11px; color:var(--amber); border:1px solid var(--amber);
    border-radius:999px; padding:2px 10px; letter-spacing:.1em}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px}
  .card h2{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim);
    margin:0 0 10px; font-weight:600}

  button,a.secondary{font:inherit; border:0; border-radius:var(--radius); cursor:pointer;
    color:var(--bg); background:var(--ink); padding:14px 18px; width:100%;
    font-weight:700; letter-spacing:.06em}
  button.secondary,a.secondary{background:var(--panel2); color:var(--ink); border:1px solid var(--line)}
  button.big{font-size:22px; padding:22px; border-radius:18px}
  button.amber{background:var(--amber)}
  button.green{background:var(--green)}
  button:disabled{opacity:.35; cursor:default}
  .row{display:flex; gap:10px}
  .row>button{flex:1}

  #roomMap,#roomMap2{width:100%; border-radius:10px; background:var(--panel2); display:block}
  .poslist{margin:10px 0 0; padding:0; list-style:none}
  .poslist li{display:flex; justify-content:space-between; padding:7px 2px;
    border-bottom:1px dashed var(--line); color:var(--dim); font-size:14px}
  .poslist li.current{color:var(--amber)}
  .poslist li.done{color:var(--green)}

  #status{min-height:22px; color:var(--amber); font-size:14px; margin:8px 0}
  .warn{color:var(--red)}
  .ok{color:var(--green)}

  canvas.trace{width:100%; height:180px; background:var(--panel2); border-radius:10px; display:block}
  .legend{display:flex; gap:14px; font-size:12px; color:var(--dim); margin-top:6px; flex-wrap:wrap}
  .legend b{font-weight:600}
  .lg-avg{color:var(--blue)} .lg-target{color:var(--dim)} .lg-corr{color:var(--green)}

  table{width:100%; border-collapse:collapse; font-size:13px}
  td,th{text-align:left; padding:6px 4px; border-bottom:1px solid var(--line)}
  th{color:var(--dim); font-weight:600; letter-spacing:.08em; text-transform:uppercase; font-size:11px}
  td.num{text-align:right; font-variant-numeric:tabular-nums}

  #fab{position:fixed; left:0; right:0; bottom:0; padding:14px 16px 22px;
    background:linear-gradient(transparent, var(--bg) 35%);}
  #fab .inner{max-width:560px; margin:0 auto}
  .hidden{display:none}

  /* --- settings --- */
  .hright{display:flex; align-items:center; gap:10px}
  #gearBtn{width:auto; padding:5px 12px; font-size:16px; font-weight:600;
    background:var(--panel2); color:var(--ink); border:1px solid var(--line); border-radius:10px}
  input[type=text],input[type=number],select,textarea{
    font:inherit; font-size:14px; color:var(--ink); background:var(--panel2);
    border:1px solid var(--line); border-radius:8px; padding:8px 10px; width:100%}
  input[type=number]{text-align:right}
  input[type=checkbox]{width:18px; height:18px; accent-color:var(--amber)}
  textarea{font-size:12px; line-height:1.5; resize:vertical}
  input:disabled,select:disabled{opacity:.4}
  .frow{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0}
  .frow>label{color:var(--dim); font-size:13px; flex:1}
  .frow>input,.frow>select{flex:1; max-width:220px}
  .hint{color:var(--dim); font-size:12px; margin:2px 0 8px}
  button.small{width:auto; padding:8px 14px; font-size:13px; border-radius:10px}
  .cardfoot{display:flex; justify-content:flex-end; gap:10px; margin-top:12px; align-items:center}
  .modeopt{display:flex; gap:10px; align-items:flex-start; padding:8px 0; cursor:pointer}
  .modeopt input{width:18px; height:18px; margin-top:2px; accent-color:var(--amber)}
  .modeopt b{font-size:14px}
  .modeopt small{display:block; color:var(--dim); font-size:12px}
  #wingBanner{border-radius:10px; padding:9px 12px; font-size:13px; margin:-6px 0 14px;
    border:1px solid var(--line)}
  #wingBanner.okb{background:rgba(93,211,158,.08); border-color:var(--green); color:var(--green)}
  #wingBanner.warnb{background:rgba(255,107,94,.08); border-color:var(--red); color:var(--red)}
  #wingBanner.dimb{background:var(--panel); border-color:var(--amber); color:var(--amber)}
  #toast{position:fixed; left:50%; transform:translateX(-50%); bottom:96px; z-index:10;
    max-width:90vw; background:var(--panel2); border:1px solid var(--line); color:var(--ink);
    border-radius:10px; padding:10px 16px; font-size:14px; opacity:0; pointer-events:none;
    transition:opacity .25s}
  #toast.show{opacity:1}
  #toast.ok{border-color:var(--green); color:var(--green)}
  #toast.warn{border-color:var(--red); color:var(--red)}
  .otable{overflow-x:auto}
  .otable input[type=text]{min-width:110px}
  .otable input[type=number]{width:64px; padding:6px}
  .otable select{width:auto; padding:6px}
  .otable td{white-space:nowrap}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:4px 16px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="hleft">
      <button id="exitBtn" class="hidden" aria-label="Exit to home">←</button>
      <h1>System Tune</h1>
    </div>
    <div class="hright">
      <span id="modeBadge">—</span>
      <button id="gearBtn" aria-label="Settings">⚙</button>
    </div>
  </header>

  <div id="wingBanner" class="hidden"></div>

  <!-- HOME -->
  <section id="home">
    <div class="card">
      <h2>Room</h2>
      <canvas id="roomMap" width="560" height="380"></canvas>
      <ul class="poslist" id="posList"></ul>
    </div>
    <div class="card">
      <h2>Run</h2>
      <div class="row">
        <button class="secondary" id="btnVerify">Verify System<br><small>~2 min · 1 position</small></button>
        <button class="amber" id="btnFull">Full Tune<br><small>guided · all positions</small></button>
      </div>
      <button class="secondary" id="btnPreflight" style="margin-top:8px">Pre-flight Check<br><small>confirm every output returns signal before starting</small></button>
    </div>
    <div class="card hidden" id="preflightSummaryCard">
      <h2>Last pre-flight</h2>
      <ul class="poslist" id="preflightSummary"></ul>
    </div>
    <div class="card hidden" id="historyCard">
      <h2>Recent sessions</h2>
      <ul class="poslist" id="historyList"></ul>
    </div>
  </section>

  <!-- PREFLIGHT -->
  <section id="preflightView" class="hidden">
    <div class="card">
      <h2>Pre-flight Check</h2>
      <p style="color:var(--dim); font-size:14px; margin:0 0 10px">Testing each output with a short tone. No mic position needed — leave the measurement mic anywhere with clear line of sight to the room.</p>
      <ul class="poslist" id="preflightLive"></ul>
    </div>
  </section>

  <!-- SESSION -->
  <section id="sessionView" class="hidden">
    <div class="card">
      <h2 id="posTitle">Position</h2>
      <canvas id="roomMap2" width="560" height="380"></canvas>
      <p id="posHint" style="color:var(--dim); font-size:14px; margin:10px 0 0"></p>
      <div id="status"></div>
    </div>
    <div class="card">
      <h2>Last trace</h2>
      <canvas class="trace" id="liveTrace" width="560" height="180"></canvas>
      <div class="legend" id="liveMeta"></div>
    </div>
  </section>

  <!-- REVIEW -->
  <section id="reviewView" class="hidden"></section>

  <!-- VERIFY REPORT -->
  <section id="verifyView" class="hidden"></section>

  <!-- SETTINGS (rendered by JS from /api/config) -->
  <section id="settingsView" class="hidden"></section>

  <div id="fab"><div class="inner" id="fabInner"></div></div>
</div>
<div id="toast"></div>

<script>
const ws = new WebSocket(`ws://${location.host}`);
const send = (m) => ws.readyState === 1 && ws.send(JSON.stringify(m));
const $ = (id) => document.getElementById(id);

let room = null, session = null, lastTrace = null, history = [];
let appConfig = null;      // { config, room } — the server's live runtime config
let settingsOpen = false;
let wingStatus = { state: 'untested', detail: '' }; // untested | connected | unreachable

ws.onmessage = (e) => {
  const { event, payload } = JSON.parse(e.data);
  if (event === 'config') { onConfig(payload); }
  if (event === 'room') { room = payload; drawRoom($('roomMap')); renderPosList(); }
  if (event === 'session') { session = payload; render(); }
  if (event === 'trace') { lastTrace = payload; drawTrace($('liveTrace'), [seriesFrom(payload)]); 
    $('liveMeta').innerHTML = `<span><b>${payload.outputId}</b></span>
      <span>delay ${payload.delayMs.toFixed(1)} ms</span>
      <span>lvl ${payload.levelDbfs} dBFS</span>
      <span class="${payload.polarity>0?'ok':'warn'}">${payload.polarity>0?'polarity +':'POLARITY −'}</span>
      <span class="${payload.snrDb>=15?'ok':'warn'}">SNR ${payload.snrDb} dB</span>
      ${payload.clipped?'<span class="warn">CLIPPED</span>':''}`; }
  if (event === 'measuring') setStatus(`Sweeping ${payload.output} @ ${payload.position}…`);
  if (event === 'preflight_progress') renderPreflightLive(payload);
  if (event === 'sessionHistory') { history = payload; renderHistory(); }
  if (event === 'warning') setStatus(payload.message, 'warn');
  if (event === 'error') setStatus(payload.message, 'warn');
  if (event === 'info') setStatus(payload.message, 'ok');
};

function setStatus(t, cls){ const s=$('status'); if(!s) return; s.textContent=t; s.className=cls||''; }

function show(id){
  for (const v of ['home','sessionView','reviewView','verifyView','preflightView','settingsView']) $(v).classList.add('hidden');
  $(id).classList.remove('hidden');
}

function preflightRow({ label, status, pass, peakDbfs, snrDb, clipped }){
  const cls = status === 'testing' ? '' : (pass ? 'ok' : 'warn');
  const reason = clipped ? 'CLIPPED' : 'NO SIGNAL';
  const detail = status === 'testing' ? 'testing…'
    : `${pass ? 'OK' : reason} · peak ${peakDbfs} dBFS · SNR ${snrDb} dB`;
  return `<li class="${cls}"><span>${label}</span><span>${detail}</span></li>`;
}

function renderPreflightLive(payload){
  const ul = $('preflightLive');
  const rows = (session?.preflightResults || []).slice();
  const idx = rows.findIndex((r) => r.outputId === payload.outputId);
  if (idx >= 0) rows[idx] = payload; else rows.push(payload);
  ul.innerHTML = rows.map(preflightRow).join('');
}

function renderPreflightSummary(){
  const card = $('preflightSummaryCard');
  const results = session?.preflightResults || [];
  if (!results.length) { card.classList.add('hidden'); return; }
  card.classList.remove('hidden');
  $('preflightSummary').innerHTML = results.map(preflightRow).join('');
}

function fmtWhen(iso){
  if (!iso) return '';
  const d = new Date(iso);
  return isNaN(d) ? iso : d.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}

function renderHistory(){
  const card = $('historyCard');
  if (!history.length) { card.classList.add('hidden'); return; }
  card.classList.remove('hidden');
  $('historyList').innerHTML = history.map((h) => {
    const tag = h.mode === 'full' ? (h.applied ? 'applied' : (h.source || 'full')) : 'verify';
    return `<li><span>${fmtWhen(h.finishedAt)} · ${tag}</span>
      <a href="/api/sessions/${h.id}" download="${h.id}.json" style="color:var(--blue)">Download</a></li>`;
  }).join('');
}

function render(){
  $('modeBadge').textContent = (session?.mode || 'idle').toUpperCase();
  const fab = $('fabInner'); fab.innerHTML = '';

  // Settings: only browsable while nothing is mid-measurement (saving would
  // 409 anyway — the server refuses config writes during a session).
  const sessionBusy = session && !['idle', 'done'].includes(session.state);
  if (sessionBusy) settingsOpen = false;
  $('gearBtn').textContent = settingsOpen ? '✕' : '⚙';
  $('gearBtn').classList.toggle('hidden', !!sessionBusy);
  if (settingsOpen) {
    $('exitBtn').classList.add('hidden');
    show('settingsView');
    return;
  }

  $('exitBtn').classList.toggle('hidden', !session || session.state === 'idle' || session.state === 'preflight');

  if (session?.state === 'preflight') {
    show('preflightView');
    $('preflightLive').innerHTML = (session.preflightResults || []).map(preflightRow).join('');
    return;
  }

  if (!session || session.state === 'idle') { show('home'); renderPreflightSummary(); return; }

  if (session.state === 'waiting_position' || session.state === 'measuring') {
    show('sessionView');
    const cur = session.positions[session.posIndex];
    $('posTitle').textContent = `Position ${session.posIndex+1} of ${session.positions.length} — ${cur?.label ?? ''}`;
    $('posHint').textContent = 'Move the mic to the highlighted spot, mic at ear height, pointed up. Keep clear of the mic during the sweep.';
    drawRoom($('roomMap2'), cur?.id);

    if (session.state === 'waiting_position') {
      const b = mkBtn('READY — RUN SWEEP', 'big green', () => send({action:'ready'}));
      fab.appendChild(b);
      if (session.posIndex > 0) fab.appendChild(mkBtn('Retake previous position','secondary',()=>send({action:'retake'})));
    } else {
      const b = mkBtn('MEASURING…', 'big'); b.disabled = true; fab.appendChild(b);
    }
  }

  if (session.state === 'review') { renderReview(); show('reviewView');
    fab.appendChild(mkBtn('APPLY TO CONSOLE','big amber',()=>confirm('Write recommended EQ + delays to the Wing?')&&send({action:'apply'})));
    if (session.currentRecordId) fab.appendChild(mkLink('Download results (JSON)','secondary',`/api/sessions/${session.currentRecordId}`));
    fab.appendChild(mkBtn('Discard','secondary',()=>send({action:'reset'})));
  }

  if (session.state === 'done') {
    if (session.mode === 'verify') { renderVerify(); show('verifyView');
      fab.appendChild(mkBtn('Save as new baseline','secondary',()=>send({action:'baseline'})));
    } else { setStatusDone(); }
    if (session.currentRecordId) fab.appendChild(mkLink('Download results (JSON)','secondary',`/api/sessions/${session.currentRecordId}`));
    fab.appendChild(mkBtn('Home','secondary',()=>send({action:'reset'})));
  }
}

function setStatusDone(){
  show('reviewView');
  const el = $('reviewView');
  if (session.recommendations?.applied) {
    el.insertAdjacentHTML('afterbegin',
      `<div class="card"><h2>Applied</h2><p class="ok">Tuning written to console. A/B against the saved baseline scene and trust your ears for the final call.</p></div>`);
  }
}

function renderReview(){
  const el = $('reviewView'); el.innerHTML = '';
  const rec = session.recommendations; if (!rec) return;

  // Who tuned this
  const src = rec.source === 'claude'
    ? '<span class="ok">Tuned by Claude</span>'
    : '<span style="color:var(--amber)">Local recommender (offline fallback)</span>';
  let head = `<div class="card"><h2>Tuning</h2><p style="margin:0 0 6px">${src}</p>`;
  if (rec.summary) head += `<p style="color:var(--dim);font-size:14px;margin:0">${rec.summary}</p>`;
  if (rec.warnings?.length) head += rec.warnings.map(w=>`<p class="warn" style="font-size:13px;margin:8px 0 0">⚠ ${w}</p>`).join('');
  head += `<p style="color:var(--dim);font-size:12px;margin:10px 0 0"><a href="/analysis.json" style="color:var(--blue)" target="_blank">export raw analysis</a></p></div>`;
  el.insertAdjacentHTML('beforeend', head);

  // Delays
  let rows = '', notes = '';
  for (const [id, d] of Object.entries(rec.delays)) {
    if (id.startsWith('_')) continue;
    rows += `<tr><td>${id}</td><td style="color:var(--dim);font-size:12px">${d.rule||''}</td><td class="num"><b>+${d.addDelayMs} ms</b></td></tr>`;
    if (d.spreadNote) notes += `<p class="warn" style="font-size:13px;margin:8px 0 0">⚠ ${id}: ${d.spreadNote}</p>`;
  }
  el.insertAdjacentHTML('beforeend', `<div class="card"><h2>Alignment</h2>
    <table><tr><th>Output</th><th>Rule</th><th style="text-align:right">Add delay</th></tr>${rows}</table>${notes}</div>`);

  // Zone report (truth-telling, not correction)
  if (rec.zoneReport) {
    let zr = '';
    for (const [zone, bands] of Object.entries(rec.zoneReport)) {
      zr += `<tr><td>${zone.replace('_',' ')}</td>` +
        ['low','mid','high'].map(b=>{
          const v = bands[b];
          const cls = Math.abs(v) > 3 ? 'warn' : '';
          return `<td class="num ${cls}">${v>0?'+':''}${v} dB</td>`;
        }).join('') + '</tr>';
    }
    el.insertAdjacentHTML('beforeend', `<div class="card"><h2>Zones vs main floor</h2>
      <table><tr><th>Zone</th><th style="text-align:right">Low</th><th style="text-align:right">Mid</th><th style="text-align:right">High</th></tr>${zr}</table>
      <p style="color:var(--dim);font-size:13px;margin:8px 0 0">Zone differences aren't fixed by system EQ — they're fill speaker alignment data. Main floor drives the correction.</p></div>`);
  }

  // Per-output EQ
  for (const [id, o] of Object.entries(rec.perOutput)) {
    const cid = `trace_${id}`;
    const hasOverlay = o.positions?.length > 1;
    let frows = o.filters.map(f =>
      `<tr><td>${f.type}</td><td class="num">${f.freq} Hz</td><td class="num">${f.gainDb>0?'+':''}${f.gainDb} dB</td><td class="num">Q ${f.q}</td><td style="color:var(--dim)">${f.reason}</td></tr>`).join('');
    el.insertAdjacentHTML('beforeend', `<div class="card"><h2>${o.label}${o.polarityIssue?' — <span class="warn">check polarity</span>':''}</h2>${o.note?`<p style="color:var(--dim);font-size:13px;margin:0 0 8px">${o.note}</p>`:''}
      <canvas class="trace" id="${cid}" width="560" height="180"></canvas>
      <div class="legend" id="legend_${id}"></div>
      ${hasOverlay?`<button class="secondary" id="toggle_${id}" style="margin:8px 0 0"></button>`:''}
      <table style="margin-top:8px"><tr><th>Type</th><th style="text-align:right">Freq</th><th style="text-align:right">Gain</th><th style="text-align:right">Q</th><th>Why</th></tr>${frows||'<tr><td colspan="5" style="color:var(--dim)">No correction needed</td></tr>'}</table></div>`);
    drawOutputTrace(id, o);
    if (hasOverlay) {
      const btn = $(`toggle_${id}`);
      btn.textContent = overlayMode[id] ? 'Show average' : `Show all ${o.positions.length} positions`;
      btn.onclick = () => { overlayMode[id] = !overlayMode[id]; drawOutputTrace(id, o); btn.textContent = overlayMode[id] ? 'Show average' : `Show all ${o.positions.length} positions`; };
    }
  }
}

const overlayMode = {}; // outputId -> true shows all per-position curves instead of the average
const OVERLAY_PALETTE = ['#ffb454','#5dd39e','#6ab7ff','#ff6b5e','#c792ea','#f2c94c','#56ccf2','#bb86fc'];

function drawOutputTrace(id, o){
  const cv = $(`trace_${id}`), legend = $(`legend_${id}`);
  if (overlayMode[id] && o.positions?.length) {
    const series = o.positions.map((p, i) => ({ freqs:o.freqs, magDb:p.magDb, color: OVERLAY_PALETTE[i % OVERLAY_PALETTE.length] }));
    series.push({ freqs:o.freqs, magDb:o.target, color:'#8b919a', dash:true });
    drawTrace(cv, series);
    legend.innerHTML = o.positions.map((p, i) =>
      `<span style="color:${OVERLAY_PALETTE[i % OVERLAY_PALETTE.length]}"><b>—</b> ${p.label}</span>`).join('')
      + '<span class="lg-target"><b>—</b> target</span>';
  } else {
    const corrected = estimateCorrected(o);
    drawTrace(cv, [
      { freqs:o.freqs, magDb:o.avg, color:'#6ab7ff' },
      { freqs:o.freqs, magDb:o.target, color:'#8b919a', dash:true },
      { freqs:o.freqs, magDb:corrected, color:'#5dd39e' }
    ]);
    legend.innerHTML = '<span class="lg-avg"><b>—</b> measured avg</span><span class="lg-target"><b>—</b> target</span><span class="lg-corr"><b>—</b> corrected (est)</span>';
  }
}

function renderVerify(){
  const el = $('verifyView'); el.innerHTML = '';
  const r = session.recommendations; if (!r) return;
  let rows = '';
  for (const o of r.outputs) {
    const drift = o.drift
      ? `${o.drift.levelDb>0?'+':''}${o.drift.levelDb} dB / ${o.drift.delayMs>0?'+':''}${o.drift.delayMs} ms`
      : '—';
    const cls = o.drift && (Math.abs(o.drift.levelDb)>2 || Math.abs(o.drift.delayMs)>1) ? 'warn' : 'ok';
    rows += `<tr><td>${o.label}</td><td class="num">${o.delayMs} ms</td><td class="num">${o.levelDbfs} dBFS</td>
      <td class="num ${o.polarity>0?'ok':'warn'}">${o.polarity>0?'+':'−'}</td><td class="num ${cls}">${drift}</td></tr>`;
  }
  el.insertAdjacentHTML('beforeend', `<div class="card"><h2>Verify report ${r.baselineFound?'':'— no baseline yet'}</h2>
    <table><tr><th>Output</th><th style="text-align:right">Arrival</th><th style="text-align:right">Level</th><th style="text-align:right">Pol</th><th style="text-align:right">Drift vs baseline</th></tr>${rows}</table></div>`);
}

/* ---------- drawing ---------- */

function drawRoom(cv, highlightId){
  if (!room || !cv) return;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height, PAD = 14;
  ctx.clearRect(0,0,W,H);

  // World bounds from walls polygon (falls back to width/depth rectangle)
  const pts = room.walls || [[0,0],[room.width,0],[room.width,room.depth],[0,room.depth]];
  const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const s = Math.min((W-2*PAD)/(maxX-minX), (H-2*PAD)/(maxY-minY));
  const X = (x)=>PAD+(x-minX)*s, Y=(y)=>PAD+(y-minY)*s;

  // Walls
  ctx.beginPath();
  pts.forEach((p,i)=> i?ctx.lineTo(X(p[0]),Y(p[1])):ctx.moveTo(X(p[0]),Y(p[1])));
  ctx.closePath();
  ctx.fillStyle = '#171b20'; ctx.fill();
  ctx.strokeStyle = '#3a4048'; ctx.lineWidth = 2; ctx.stroke();

  ctx.font = '11px ui-monospace';

  // Stage
  if (room.stage) {
    const g = room.stage;
    ctx.fillStyle = '#22262d';
    ctx.fillRect(X(g.x), Y(g.y), g.w*s, g.h*s);
    ctx.fillStyle = '#8b919a';
    ctx.fillText('STAGE', X(g.x)+8, Y(g.y)+16);
  }
  // Balcony footprint
  if (room.balcony) {
    const b = room.balcony;
    ctx.fillStyle = 'rgba(255,180,84,0.08)';
    ctx.fillRect(X(b.x), Y(b.y), b.w*s, b.h*s);
    ctx.strokeStyle = 'rgba(255,180,84,0.5)'; ctx.setLineDash([6,4]);
    ctx.strokeRect(X(b.x), Y(b.y), b.w*s, b.h*s);
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,180,84,0.7)';
    ctx.fillText('BALCONY (above)', X(b.x)+6, Y(b.y)+14);
  }
  // Booth
  if (room.booth) {
    const b = room.booth;
    ctx.strokeStyle = '#3a4048';
    ctx.strokeRect(X(b.x), Y(b.y), b.w*s, b.h*s);
    ctx.fillStyle = '#5a616b';
    ctx.fillText('FOH', X(b.x)+4, Y(b.y)-4);
  }
  // Speakers
  for (const sp of room.speakers || []) {
    const x = X(sp.x), y = Y(sp.y);
    ctx.fillStyle = sp.id.startsWith('fill') ? '#6ab7ff' : '#ff6b5e';
    ctx.beginPath();
    ctx.moveTo(x, y-6); ctx.lineTo(x+6, y+5); ctx.lineTo(x-6, y+5);
    ctx.closePath(); ctx.fill();
  }
  // Positions
  for (const p of room.positions) {
    const x = X(p.x), y = Y(p.y);
    const isHi = p.id === highlightId;
    ctx.beginPath();
    ctx.arc(x, y, isHi ? 13 : 7, 0, Math.PI*2);
    ctx.fillStyle = isHi ? '#ffb454' : (p.zone==='balcony' ? '#7a6a4a' : p.zone==='under_balcony' ? '#4a5568' : '#3a4048');
    ctx.fill();
    if (isHi) { ctx.strokeStyle='#ffb454'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI*2); ctx.stroke(); }
    ctx.fillStyle = isHi ? '#ffb454' : '#8b919a';
    const tw = ctx.measureText(p.label).width;
    if (Math.abs(p.x - room.width / 2) < 0.3) {
      ctx.fillText(p.label, x - tw/2, y + (isHi ? 34 : 22)); // on-center: label centered below dot
    } else {
      ctx.fillText(p.label, x+16+tw > W-6 ? x-16-tw : x+16, y+4); // side: flip at right edge
    }
  }
}

function renderPosList(){
  const ul = $('posList'); if (!ul || !room) return;
  ul.innerHTML = room.positions.map(p =>
    `<li><span>${p.label}</span><span>${p.zone} · w${p.weight}</span></li>`).join('');
}

function seriesFrom(t){ return { freqs:t.freqs, magDb:t.magDb, color:'#6ab7ff' }; }

function drawTrace(cv, series){
  if (!cv || !series?.length) return;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height, pad = 26;
  ctx.clearRect(0,0,W,H);
  ctx.font = '10px ui-monospace'; ctx.fillStyle = '#5a616b'; ctx.strokeStyle = '#232830';

  const fLo = Math.log10(20), fHi = Math.log10(20000);
  const dLo = -18, dHi = 12;
  const X = f => pad + ((Math.log10(f)-fLo)/(fHi-fLo)) * (W-pad-8);
  const Y = d => H-18 - ((d-dLo)/(dHi-dLo)) * (H-30);

  for (const f of [31.5,63,125,250,500,1000,2000,4000,8000,16000]) {
    ctx.beginPath(); ctx.moveTo(X(f),8); ctx.lineTo(X(f),H-18); ctx.stroke();
    ctx.fillText(f>=1000?`${f/1000}k`:f, X(f)-8, H-6);
  }
  for (const d of [-12,-6,0,6]) {
    ctx.beginPath(); ctx.moveTo(pad,Y(d)); ctx.lineTo(W-8,Y(d)); ctx.stroke();
    ctx.fillText(`${d>0?'+':''}${d}`, 2, Y(d)+3);
  }

  for (const s of series) {
    ctx.beginPath();
    ctx.strokeStyle = s.color; ctx.lineWidth = 1.6;
    ctx.setLineDash(s.dash ? [5,4] : []);
    s.freqs.forEach((f,i)=>{ const x=X(f), y=Y(Math.max(dLo,Math.min(dHi,s.magDb[i])));
      i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
    ctx.stroke(); ctx.setLineDash([]);
  }
}

/** Rough preview of post-EQ response for the review chart. */
function estimateCorrected(o){
  const out = o.avg.slice();
  for (const f of o.filters) {
    for (let i=0;i<o.freqs.length;i++){
      const fr = o.freqs[i];
      if (f.type==='hshelf'){ if (fr>=f.freq/2) out[i]+=f.gainDb*Math.min(1,Math.log2(fr/(f.freq/2))); }
      else {
        const oct = Math.log2(fr/f.freq);
        const bw = 1.41/f.q;
        out[i] += f.gainDb * Math.exp(-(oct*oct)/(2*Math.pow(bw/2.355,2)));
      }
    }
  }
  return out;
}

/* ============================ SETTINGS ============================ */

const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

let toastTimer;
function showToast(msg, cls){
  const t = $('toast');
  t.textContent = msg;
  t.className = `show ${cls||''}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, cls === 'warn' ? 6000 : 2200);
}

const dirtyCards = new Set();
function anyCardDirty(){ return dirtyCards.size > 0; }
function markDirty(card, yes = true){
  if (yes) dirtyCards.add(card); else dirtyCards.delete(card);
  const btn = $(`save_${card}`);
  if (btn) btn.disabled = !yes;
}

function onConfig(payload){
  appConfig = payload;
  updateWingBanner();
  if (settingsOpen) {
    if (anyCardDirty()) showToast('Settings changed on another device — unsaved edits here are stale', 'warn');
    else renderSettings();
  }
  if (appConfig.config.mode === 'live' && wingStatus.state === 'untested') autoTestWing();
}

function updateWingBanner(){
  const b = $('wingBanner');
  const cfg = appConfig?.config;
  if (!cfg || cfg.mode !== 'live') { b.className = 'hidden'; return; }
  const at = `${cfg.wing.host}:${cfg.wing.port}`;
  if (wingStatus.state === 'connected') { b.className = 'okb'; b.textContent = `Connected to Wing at ${at}`; }
  else if (wingStatus.state === 'unreachable') { b.className = 'warnb'; b.textContent = `Wing unreachable at ${at} — ${wingStatus.detail || 'no reply'}`; }
  else { b.className = 'dimb'; b.textContent = `Live mode — Wing at ${at} not tested yet`; }
}

async function testWing(body){
  try {
    const res = await fetch('/api/test-wing', {
      method: 'POST', headers: {'content-type':'application/json'}, body: JSON.stringify(body || {})
    });
    return await res.json();
  } catch (err) { return { ok: false, error: String(err) }; }
}

async function autoTestWing(){
  const r = await testWing({});
  wingStatus = r.ok ? { state: 'connected' } : { state: 'unreachable', detail: r.message || r.error || 'timeout' };
  updateWingBanner();
}

async function saveConfig(card, patch){
  try {
    const res = await fetch('/api/config', {
      method: 'POST', headers: {'content-type':'application/json'}, body: JSON.stringify(patch)
    });
    const body = await res.json();
    if (!res.ok) {
      showToast(body.errors ? body.errors.join(' · ') : (body.error || `HTTP ${res.status}`), 'warn');
      return false;
    }
    markDirty(card, false);
    showToast('Saved', 'ok');
    return true;
  } catch (err) {
    showToast(String(err), 'warn');
    return false;
  }
}

$('gearBtn').onclick = async () => {
  settingsOpen = !settingsOpen;
  if (settingsOpen) {
    if (!appConfig) {
      try { appConfig = await (await fetch('/api/config')).json(); }
      catch { showToast('Could not load config', 'warn'); settingsOpen = false; render(); return; }
    }
    renderSettings();
  }
  render();
};

const GUARDRAIL_FIELDS = [
  'eqAutoMaxHz','maxCutDb','maxBoostDb','maxFiltersPerOutput','minQ','maxQ',
  'maxBoostQ','nullVarianceDb','minFilterHz','noBoostBelowHz','minFilterSpacingOct','tiltOnlyAboveHz'
];

let outputsDraft = null; // working copy of C.outputs while the settings page is open

function renderSettings(){
  const C = appConfig.config, R = appConfig.room;
  dirtyCards.clear();
  outputsDraft = structuredClone(C.outputs);
  const el = $('settingsView');

  const frow = (label, inner) => `<div class="frow"><label>${label}</label>${inner}</div>`;
  const num = (id, value, attrs = '') => `<input type="number" id="${id}" value="${value}" ${attrs}>`;
  const text = (id, value) => `<input type="text" id="${id}" value="${esc(value)}">`;

  const outputRow = (o, i) => `
    <tr data-i="${i}">
      <td><input type="checkbox" class="o_en" ${o.enabled !== false ? 'checked' : ''}></td>
      <td><input type="text" class="o_label" value="${esc(o.label)}"></td>
      <td><select class="o_type">
        <option value="main" ${o.wing?.type !== 'mtx' ? 'selected' : ''}>main</option>
        <option value="mtx" ${o.wing?.type === 'mtx' ? 'selected' : ''}>mtx</option>
      </select></td>
      <td><input type="number" class="o_num" value="${o.wing?.num ?? 1}" min="1" max="64"></td>
      <td><input type="number" class="o_lo" value="${o.band?.[0] ?? 20}" min="10" max="24000"></td>
      <td><input type="number" class="o_hi" value="${o.band?.[1] ?? 20000}" min="10" max="24000"></td>
      <td><input type="number" class="o_trim" value="${o.sweepTrimDb ?? 0}" min="-60" max="0" step="1"></td>
    </tr>`;

  const curves = C.targetCurves ?? [C.targetCurve];
  const guardrailInput = (key) =>
    `<div class="frow"><label>${key}</label>${num(`gr_${key}`, C.guardrails[key], 'disabled step="any"')}</div>`;

  el.innerHTML = `
    <div class="card">
      <h2>Mode &amp; Console</h2>
      <label class="modeopt"><input type="radio" name="set_mode" value="mock" ${C.mode === 'mock' ? 'checked' : ''}>
        <span><b>Mock</b><small>Simulated PA + room. Full workflow, zero hardware touched — safe anywhere.</small></span></label>
      <label class="modeopt"><input type="radio" name="set_mode" value="live" ${C.mode === 'live' ? 'checked' : ''}>
        <span><b>Live</b><small>Real console over OSC + real audio I/O. Only on the console network.</small></span></label>
      ${frow('Wing IP', text('set_wing_host', C.wing.host))}
      ${frow('Wing OSC port', num('set_wing_port', C.wing.port, 'min="1" max="65535"'))}
      <div class="cardfoot">
        <span id="testWingResult" style="font-size:12px;color:var(--dim);flex:1"></span>
        <button class="small secondary" id="btnTestWing">Test connection</button>
        <button class="small" id="save_console" disabled>Save</button>
      </div>
    </div>

    <div class="card">
      <h2>Audio</h2>
      ${frow('Input device', text('set_in_dev', C.audio.inputDevice))}
      ${frow('Output device', text('set_out_dev', C.audio.outputDevice))}
      <p class="hint">Device names must match the audio device list on the brain box — run the device-list helper (e.g. <code>sox --help</code> / ASIO panel) to see exact strings.</p>
      ${frow('Reference capture channel', num('set_ref_ch', C.audio.referenceInputChannel, 'min="1" max="64"'))}
      ${frow('Mic capture channel', num('set_mic_ch', C.audio.micInputChannel, 'min="1" max="64"'))}
      ${frow('Sweep length (s)', num('set_sweep_s', C.audio.sweep.seconds, 'min="1" max="30"'))}
      ${frow('Sweep level (dBFS)', num('set_sweep_lvl', C.audio.sweep.levelDbfs, 'min="-60" max="-6"'))}
      <p class="hint">Level is capped at -6 dBFS — sweep headroom is not optional.</p>
      <div class="cardfoot"><button class="small" id="save_audio" disabled>Save</button></div>
    </div>

    <div class="card">
      <h2>Outputs</h2>
      <div class="otable"><table id="outputsTable">
        <tr><th>On</th><th>Label</th><th>Route</th><th>#</th><th>Lo Hz</th><th>Hi Hz</th><th>Trim dB</th></tr>
        ${outputsDraft.map(outputRow).join('')}
      </table></div>
      <div class="cardfoot">
        <button class="small secondary" id="btnAddOutput">+ Add output</button>
        <button class="small" id="save_outputs" disabled>Save</button>
      </div>
    </div>

    <div class="card">
      <h2>Tuning</h2>
      ${frow('Target curve', `<select id="set_curve">${curves.map((c) =>
        `<option value="${esc(c.name)}" ${c.name === C.targetCurve.name ? 'selected' : ''}>${esc(c.name)}</option>`).join('')}</select>`)}
      ${frow('Fill precedence (ms)', num('set_fillprec', C.guardrails.fillPrecedenceMs, 'min="0" max="20" step="0.5"'))}
      <p class="hint">Guardrails are safety limits enforced in code on every recommendation (local or Claude). Read-only unless unlocked.</p>
      <label class="modeopt"><input type="checkbox" id="set_unlock_gr">
        <span><b>Unlock advanced</b><small>Edit guardrail limits. Know why before changing these.</small></span></label>
      <div class="grid2">${GUARDRAIL_FIELDS.map(guardrailInput).join('')}</div>
      <div class="frow"><label>requireApplyTap</label><input type="checkbox" id="gr_requireApplyTap" ${C.guardrails.requireApplyTap ? 'checked' : ''} disabled></div>
      <div class="cardfoot"><button class="small" id="save_tuning" disabled>Save</button></div>
    </div>

    <div class="card">
      <h2>Room</h2>
      ${frow('Verify position', `<select id="set_verify_pos">${R.positions.map((p) =>
        `<option value="${esc(p.id)}" ${p.id === R.verifyPosition ? 'selected' : ''}>${esc(p.label)}</option>`).join('')}</select>`)}
      <p class="hint">${esc(R.name)} · ${R.width} m wide · ${R.positions.length} positions · ${(R.speakers || []).length} speakers</p>
      <p class="hint">Room geometry edits still happen in config/room.json for now — positions drive delay predictions, so they change with a tape measure, not a form.</p>
      <div class="cardfoot"><button class="small" id="save_room" disabled>Save</button></div>
    </div>

    <div class="card">
      <h2>Advanced</h2>
      <p class="hint">Raw config editor — the escape hatch. Validated server-side before anything is written; saving REPLACES the whole config (deletions stick).</p>
      <textarea id="set_rawjson" rows="16" spellcheck="false"></textarea>
      <div class="cardfoot">
        <button class="small secondary" id="btnRawReload">Reload</button>
        <button class="small" id="save_raw" disabled>Validate &amp; Save</button>
      </div>
    </div>`;

  $('set_rawjson').value = JSON.stringify(C, null, 2);

  // Dirty tracking: any input inside a card enables that card's save button.
  const wire = (card, ids) => {
    for (const id of ids) {
      const node = $(id);
      if (node) node.addEventListener('input', () => markDirty(card));
    }
  };
  wire('console', ['set_wing_host', 'set_wing_port']);
  document.querySelectorAll('input[name=set_mode]').forEach((r) => r.addEventListener('change', () => markDirty('console')));
  wire('audio', ['set_in_dev', 'set_out_dev', 'set_ref_ch', 'set_mic_ch', 'set_sweep_s', 'set_sweep_lvl']);
  $('outputsTable').addEventListener('input', () => markDirty('outputs'));
  wire('tuning', ['set_curve', 'set_fillprec', 'gr_requireApplyTap', ...GUARDRAIL_FIELDS.map((k) => `gr_${k}`)]);
  $('set_curve').addEventListener('change', () => markDirty('tuning'));
  $('set_verify_pos').addEventListener('change', () => markDirty('room'));
  $('set_rawjson').addEventListener('input', () => markDirty('raw'));

  /* --- card 1: mode & console --- */
  $('btnTestWing').onclick = async () => {
    const mode = document.querySelector('input[name=set_mode]:checked')?.value;
    const out = $('testWingResult');
    out.style.color = 'var(--dim)'; out.textContent = 'testing…';
    const r = await testWing({ mode, host: $('set_wing_host').value.trim(), port: Number($('set_wing_port').value) });
    if (r.mock) { out.style.color = 'var(--green)'; out.textContent = 'mock — always connected'; }
    else if (r.ok) {
      out.style.color = 'var(--green)'; out.textContent = `reply from ${r.host}:${r.port} (${r.address})`;
      wingStatus = { state: 'connected' }; updateWingBanner();
    } else {
      out.style.color = 'var(--red)'; out.textContent = r.message || r.error || 'timeout';
      wingStatus = { state: 'unreachable', detail: r.message || r.error || 'timeout' }; updateWingBanner();
    }
  };
  $('save_console').onclick = async () => {
    const ok = await saveConfig('console', { config: {
      mode: document.querySelector('input[name=set_mode]:checked')?.value,
      wing: { host: $('set_wing_host').value.trim(), port: Number($('set_wing_port').value) }
    }});
    if (ok) { wingStatus = { state: 'untested', detail: '' }; updateWingBanner(); }
  };

  /* --- card 2: audio --- */
  $('save_audio').onclick = () => saveConfig('audio', { config: { audio: {
    inputDevice: $('set_in_dev').value.trim(),
    outputDevice: $('set_out_dev').value.trim(),
    referenceInputChannel: Number($('set_ref_ch').value),
    micInputChannel: Number($('set_mic_ch').value),
    sweep: { seconds: Number($('set_sweep_s').value), levelDbfs: Number($('set_sweep_lvl').value) }
  }}});

  /* --- card 3: outputs --- */
  $('btnAddOutput').onclick = () => {
    const usedIds = new Set(outputsDraft.map((o) => o.id));
    let n = 1; while (usedIds.has(`fill_new_${n}`)) n++;
    const usedMtx = outputsDraft.filter((o) => o.wing?.type === 'mtx').map((o) => o.wing.num);
    let mtxNum = 1; while (usedMtx.includes(mtxNum)) mtxNum++;
    const fresh = { id: `fill_new_${n}`, label: `New fill ${n}`, role: 'fill', enabled: false,
      wing: { type: 'mtx', num: mtxNum, TODO: 'assign at console' }, band: [80, 16000], sweepTrimDb: 0 };
    outputsDraft.push(fresh);
    $('outputsTable').insertAdjacentHTML('beforeend', outputRow(fresh, outputsDraft.length - 1));
    markDirty('outputs');
  };
  $('save_outputs').onclick = () => {
    const rows = [...document.querySelectorAll('#outputsTable tr[data-i]')];
    const outputs = rows.map((tr) => {
      const orig = outputsDraft[Number(tr.dataset.i)];
      const q = (cls) => tr.querySelector(`.${cls}`);
      return { ...orig,
        enabled: q('o_en').checked,
        label: q('o_label').value.trim(),
        wing: { ...orig.wing, type: q('o_type').value, num: Number(q('o_num').value) },
        band: [Number(q('o_lo').value), Number(q('o_hi').value)],
        sweepTrimDb: Number(q('o_trim').value)
      };
    });
    return saveConfig('outputs', { config: { outputs } });
  };

  /* --- card 4: tuning --- */
  $('set_unlock_gr').onchange = (e) => {
    const unlocked = e.target.checked;
    for (const k of GUARDRAIL_FIELDS) $(`gr_${k}`).disabled = !unlocked;
    $('gr_requireApplyTap').disabled = !unlocked;
  };
  $('save_tuning').onclick = () => {
    const guardrails = { fillPrecedenceMs: Number($('set_fillprec').value) };
    if ($('set_unlock_gr').checked) {
      for (const k of GUARDRAIL_FIELDS) guardrails[k] = Number($(`gr_${k}`).value);
      guardrails.requireApplyTap = $('gr_requireApplyTap').checked;
    }
    const patch = { config: { guardrails } };
    const chosen = curves.find((c) => c.name === $('set_curve').value);
    if (chosen && chosen.name !== C.targetCurve.name) patch.config.targetCurve = chosen;
    return saveConfig('tuning', patch);
  };

  /* --- card 5: room --- */
  $('save_room').onclick = () => saveConfig('room', { room: { verifyPosition: $('set_verify_pos').value } });

  /* --- card 6: advanced --- */
  $('btnRawReload').onclick = () => {
    $('set_rawjson').value = JSON.stringify(appConfig.config, null, 2);
    markDirty('raw', false);
  };
  $('save_raw').onclick = () => {
    let parsed;
    try { parsed = JSON.parse($('set_rawjson').value); }
    catch (err) { showToast(`JSON parse error: ${err.message}`, 'warn'); return; }
    return saveConfig('raw', { config: parsed, replace: true });
  };
}

function mkBtn(html, cls, fn){
  const b=document.createElement('button');
  b.className=cls; b.innerHTML=html; if(fn) b.onclick=fn;
  b.style.marginTop='8px'; return b;
}

/** Anchor styled like a button, for real browser downloads (not a WS action). */
function mkLink(html, cls, href){
  const a=document.createElement('a');
  a.className=cls; a.innerHTML=html; a.href=href; a.download='';
  a.style.marginTop='8px'; a.style.display='block'; a.style.textAlign='center';
  a.style.textDecoration='none'; a.style.boxSizing='border-box';
  return a;
}
